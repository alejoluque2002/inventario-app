<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inventario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-4">

            <div class="card">

                <div class="card-header">
                    Iniciar sesión
                </div>

                <div class="card-body">

                    <form id="loginForm">

                        <div class="mb-3">
                            <input
                                type="email"
                                id="email"
                                class="form-control"
                                placeholder="Email"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <input
                                type="password"
                                id="password"
                                class="form-control"
                                placeholder="Contraseña"
                                required
                            >
                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">
                            Entrar
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
